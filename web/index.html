<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <title>OKO NVR PLAYER</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/player.css">
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div class="logo"></div>
      <h1>OKO NVR PLAYER</h1>
    </div>
    <div class="header-right">
      <div class="stats">
        <span class="online" id="count-online">0</span> online
        <span class="sep">&middot;</span>
        <span class="offline" id="count-offline">0</span> offline
        <span class="sep">&middot;</span>
        <span class="bandwidth" id="bandwidth" title="Total bandwidth of all active streams">0 Mbps</span>
        <span class="sep" id="h265-sep" style="display:none">&middot;</span>
        <span class="h265-badge" id="h265-badge" style="display:none" title="H.265/HEVC WebRTC supported — no transcoding needed">H.265</span>
      </div>
      <div class="clock" id="clock"></div>
      <span class="watch-badge" id="watch-badge"></span>
      <div class="watch-wrap">
        <button class="header-btn watch-btn" id="watch-btn" title="Watch mode — detect motion (W)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button><button class="header-btn watch-cfg-btn" id="watch-cfg-btn" title="Watch settings">&#9662;</button>
        <div class="watch-popup" id="watch-popup">
          <div class="watch-popup-row">
            <span class="watch-popup-label">Sensitivity</span>
            <input type="range" class="watch-slider" id="watch-sensitivity" min="1" max="10" value="10" step="1">
            <span class="watch-slider-val" id="watch-sensitivity-val">10</span>
          </div>
          <div class="watch-popup-row watch-ai-section">
            <span class="watch-popup-label">AI model</span>
            <select class="watch-model-select" id="watch-model-select">
              <option value="mediapipe">EfficientDet (CDN)</option>
            </select>
            <span class="watch-ai-status" id="watch-ai-status">off</span>
          </div>
          <div class="watch-popup-row watch-type-filters" id="watch-type-filters">
            <label class="watch-type-label watch-type-motion"><input type="checkbox" id="watch-type-motion" checked> Motion</label>
            <label class="watch-type-label watch-type-human"><input type="checkbox" id="watch-type-human" checked> Human</label>
            <label class="watch-type-label watch-type-vehicle"><input type="checkbox" id="watch-type-vehicle" checked> Vehicle</label>
            <label class="watch-type-label watch-type-animal"><input type="checkbox" id="watch-type-animal" checked> Animal</label>
          </div>
          <label class="watch-popup-row watch-filter-label">
            <input type="checkbox" id="watch-filter"> Detected only
          </label>
        </div>
      </div>
      <button class="header-btn" id="compact-btn" title="Compact mode — hide header &amp; controls (C to toggle)">&#9881;</button>
      <button class="header-btn" id="theme-btn" title="Toggle light/dark theme (T)">&#9788;</button>
    </div>
  </header>

  <div class="server-activity-bar" id="server-activity"></div>

  <nav class="controls" id="controls">
    <span class="controls-label">Grid:</span>
    <button class="ctrl-btn grid-btn grid-btn-auto active" data-cols="auto" title="Auto-fit all cameras to screen (Ctrl+`)">Auto</button>
    <button class="ctrl-btn grid-btn" data-cols="1" title="1 camera per row (Ctrl+1)">1&times;</button>
    <button class="ctrl-btn grid-btn" data-cols="2" title="2 cameras per row (Ctrl+2)">2&times;</button>
    <button class="ctrl-btn grid-btn" data-cols="4" title="4 cameras per row (Ctrl+3)">4&times;</button>
    <button class="ctrl-btn grid-btn" data-cols="6" title="6 cameras per row (Ctrl+4)">6&times;</button>

    <div class="controls-sep"></div>

    <div class="search-wrap">
      <input type="text" class="search-input" id="search" placeholder="Search... 1,5-8" title="Filter by ID, name, or number range (e.g. 1,5-8)">
      <button class="search-clear" id="search-clear">&times;</button>
    </div>

    <button class="ctrl-btn" id="refresh-btn" title="Reconnect all cameras (R)">&#x21bb;</button>
  </nav>

  <main class="grid cols-auto" id="grid"></main>

  <div class="kbd-hint" id="kbd-hint"></div>

  <script type="module">
    import { App } from './js/app.js';
    const app = new App();
    app.start();
  </script>
  <script>document.body.tabIndex=-1;window.onload=()=>document.body.focus();</script>

</body>
</html>
