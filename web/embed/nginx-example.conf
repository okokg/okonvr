# OKO Embed — example nginx config for external site
#
# Each camera needs 3 proxy locations.
# Generate auth: echo -n 'user:password' | base64
#
# Common params (include file):
#
#   proxy_set_header Authorization "Basic <base64>";
#   proxy_set_header Host $host;
#   proxy_set_header X-Real-IP $remote_addr;
#   proxy_buffering off;
#   proxy_http_version 1.1;

# ── Camera: gate ──

location /cam/gate/webrtc {
    proxy_pass http://oko-server/api/webrtc?src=M1;
    include oko_proxy_params;
}

location /cam/gate/ws {
    proxy_pass http://oko-server/api/ws?src=M1;
    include oko_proxy_params;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400s;
}

location /cam/gate/snap {
    proxy_pass http://oko-server/backend/snapshot/M1;
    include oko_proxy_params;
}
