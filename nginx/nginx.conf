worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        auth_basic "OKO NVR";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # Static frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # JS/CSS — no cache
        location ~* \.(js|css)$ {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # ── go2rtc API (WebRTC signaling + stream info) ──
        # ^~ prevents regex (.js/.css) from intercepting /api/ paths
        location ^~ /api/ {
            proxy_pass http://go2rtc:1984/api/;
            proxy_buffering off;

            # WebSocket support (for MSE fallback if needed)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Backend API (cameras config, metadata) ──
        # ^~ prevents regex (.js/.css) from intercepting /backend/ paths
        location ^~ /backend/ {
            proxy_pass http://backend:3000/;
            proxy_buffering off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── go2rtc admin UI ──
        # ^~ prevents regex (.js/.css) from intercepting /admin/ paths
        location ^~ /admin/ {
            proxy_pass http://go2rtc:1984/;
            proxy_buffering off;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Rewrite redirects from go2rtc so they stay under /admin/
            proxy_redirect / /admin/;
        }
    }
}