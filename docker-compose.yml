services:
  # 1. Backend reads oko.yaml, generates go2rtc.yaml, runs API
  backend:
    build: ./backend
    container_name: oko-backend
    restart: unless-stopped
    environment:
      - SERVER_IP=${SERVER_IP}
      - WEBRTC_PORT=${WEBRTC_PORT:-8555}
      - DETECT_URL=http://detect:3001
    volumes:
      - backend-data:/data
      - go2rtc-config:/config/go2rtc
      - ./oko.yaml:/config/oko.yaml:ro
      - ./models:/models:ro

  # 2. go2rtc reads auto-generated config from shared volume
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: oko-go2rtc
    restart: unless-stopped
    ports:
      - "${WEBRTC_PORT:-8555}:${WEBRTC_PORT:-8555}/tcp"
      - "${WEBRTC_PORT:-8555}:${WEBRTC_PORT:-8555}/udp"
      - "127.0.0.1:1984:1984"
    volumes:
      - go2rtc-config:/config
    depends_on:
      - backend

  # 3. nginx proxies to backend + go2rtc, serves static frontend
  nginx:
    image: nginx:alpine
    container_name: oko-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8888}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd
      - ./web:/usr/share/nginx/html
    depends_on:
      - backend
      - go2rtc
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -d /etc/nginx/.htpasswd ]; then
          echo "[oko-nginx] WARNING: .htpasswd is a directory (Docker quirk), creating default"
          rm -rf /etc/nginx/.htpasswd
          echo 'demo:$$apr1$$default$$pljh2huX5l.Y7gWwKFSFB0' > /etc/nginx/.htpasswd
          echo "[oko-nginx] Created default .htpasswd (demo/demo) — run gen-htpasswd.sh to change"
        elif [ ! -s /etc/nginx/.htpasswd ]; then
          echo "[oko-nginx] WARNING: .htpasswd is empty, creating default"
          echo 'demo:$$apr1$$default$$pljh2huX5l.Y7gWwKFSFB0' > /etc/nginx/.htpasswd
        fi
        exec nginx -g 'daemon off;'

  # 4. oko-detect — server-side AI detection (Google Coral TPU)
  #    Optional: only starts with `docker compose --profile coral up -d`
  #    Without Coral, frontend uses browser-side WASM detection (MediaPipe).
  #    Place .tflite models in ./models/
  detect:
    build: ./detect
    container_name: oko-detect
    profiles: ["coral"]
    restart: on-failure:3
    privileged: true
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    volumes:
      - ./models:/models:ro
      - ./detect/detector.py:/app/detector.py:ro
      - ./detect/entrypoint.sh:/app/entrypoint.sh:ro
    environment:
      - GO2RTC_RTSP=rtsp://go2rtc:8554
      - GO2RTC_URL=http://go2rtc:1984
      - MAX_FPS=15
      - CONF_THRESH=0.3
      - CORAL_DEVICE=0
    depends_on:
      - go2rtc

volumes:
  backend-data:
  go2rtc-config:
