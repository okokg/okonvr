# Dev mode: auto-reload on .ts changes
# Usage: docker compose up -d --build
# (docker compose automatically merges this with docker-compose.yml)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - backend-data:/data
      - go2rtc-config:/config/go2rtc
      - ./oko.yaml:/config/oko.yaml:ro
      - ./backend/src:/app/src:ro
