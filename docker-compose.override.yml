# Dev mode: auto-reload on .ts changes
# Usage: docker compose up -d --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - backend-data:/data
      - go2rtc-config:/config/go2rtc
      - ./oko.yaml:/config/oko.yaml:ro
      - ./backend/src:/app/src:ro
      - ./models:/models:ro

  # Dev: mount packages/oko-player/src over web/js/oko-player for live editing
  nginx:
    volumes:
      - ./packages/oko-player/src:/usr/share/nginx/html/js/oko-player:ro
